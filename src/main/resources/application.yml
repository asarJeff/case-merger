server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

case-api:
  base-url: ${CASE_API_BASE_URL}
  username: ${CASE_API_USERNAME}
  password: ${CASE_API_PASSWORD}

merge:
  enabled: ${MERGE_ENABLED:true}
  fixed-delay-ms: ${MERGE_FIXED_DELAY_MS:300000}
  page-size: ${MERGE_PAGE_SIZE:200}
  max-pages: ${MERGE_MAX_PAGES:50}

  tracking-field: ${MERGE_TRACKING_FIELD:TrackingNumber}
  require-individual-customer: ${MERGE_REQUIRE_INDIVIDUAL_CUSTOMER:true}
  exclude-account: ${MERGE_EXCLUDE_ACCOUNT:true}

  related-case-type: ${MERGE_RELATED_CASE_TYPE:2886}
  related-case-role: ${MERGE_RELATED_CASE_ROLE:14}

  # Default status schema fallback (used only if a case has no statusSchema field)
  status-schema: ${MERGE_STATUS_SCHEMA:Z2}

  # Z5 = Solved (Completed) — intermediate step and terminal for Claims (Z2)
  status-completed: ${MERGE_STATUS_COMPLETED:Z5}

  # Default fallback terminal status if schema not found in schema-closed-status map
  status-closed: ${MERGE_STATUS_CLOSED:Z5}

  lifecycle-open: ${MERGE_LIFECYCLE_OPEN:OPEN}
  lifecycle-completed: ${MERGE_LIFECYCLE_COMPLETED:COMPLETED}

  # Per-schema terminal status mapping.
  # Z2 (Claims)     — resolves at Z5 (Solved). Never transitions to 06.
  # Z3 (Operations) — closes at 06 (Closed).
  schema-closed-status:
    Z2: ${MERGE_SCHEMA_CLOSED_STATUS_Z2:Z5}
    Z3: ${MERGE_SCHEMA_CLOSED_STATUS_Z3:06}

spring:
  codec:
    max-in-memory-size: 5MB